version: '3.8'

services:
  # Redis for BullMQBus (process mode communication)
  redis:
    image: redis:7-alpine
    container_name: aurora-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - aurora-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Config Service (must start first)
  config-service:
    build:
      context: .
      dockerfile: docker/services/Dockerfile.config
    container_name: aurora-config
    command: python -m app.services.config
    environment:
      - AURORA_ENV=production
      - AURORA_ARCHITECTURE_MODE=processes
      - REDIS_URL=redis://redis:6379
      - AURORA_LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/app/data
      - ./config:/app/config
      - ./logs:/app/logs
      - ./config.json:/app/config.json:ro
    networks:
      - aurora-network
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # DB Service
  db-service:
    build:
      context: .
      dockerfile: docker/services/Dockerfile.db
      args:
        DB_EMBEDDINGS_MODE: ${DB_EMBEDDINGS_MODE:-openai}
    container_name: aurora-db
    command: python -m app.services.db
    environment:
      - AURORA_ENV=production
      - AURORA_ARCHITECTURE_MODE=processes
      - REDIS_URL=redis://redis:6379
      - AURORA_LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/app/data
      - ./config:/app/config
      - ./logs:/app/logs
      - ./config.json:/app/config.json:ro
    networks:
      - aurora-network
    depends_on:
      - config-service
      - redis
    restart: unless-stopped

  # Orchestrator Service
  orchestrator-service:
    build:
      context: .
      dockerfile: docker/services/Dockerfile.orchestrator
      args:
        ORCHESTRATOR_LLM_MODE: ${ORCHESTRATOR_LLM_MODE:-openai}
        ORCHESTRATOR_HARDWARE: ${ORCHESTRATOR_HARDWARE:-cpu}
    container_name: aurora-orchestrator
    command: python -m app.services.orchestrator
    environment:
      - AURORA_ENV=production
      - AURORA_ARCHITECTURE_MODE=processes
      - REDIS_URL=redis://redis:6379
      - AURORA_LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
      - AURORA_LLAMA_CPP_MODEL_PATH=${AURORA_LLAMA_CPP_MODEL_PATH:-/app/models/llama/model.gguf}
      - AURORA_HUGGINGFACE_MODEL_ID=${AURORA_HUGGINGFACE_MODEL_ID:-}
    volumes:
      - ./data:/app/data
      - ./config:/app/config
      - ./logs:/app/logs
      - ./config.json:/app/config.json:ro
      - ./models:/app/models
    networks:
      - aurora-network
    depends_on:
      - config-service
      - db-service
      - tooling-service
    restart: unless-stopped

  # TTS Service
  tts-service:
    build:
      context: .
      dockerfile: docker/services/Dockerfile.tts
      args:
        TTS_HARDWARE: ${TTS_HARDWARE:-cpu}
    container_name: aurora-tts
    command: python -m app.services.tts
    environment:
      - AURORA_ENV=production
      - AURORA_ARCHITECTURE_MODE=processes
      - REDIS_URL=redis://redis:6379
      - AURORA_LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
      - AURORA_TTS_MODEL_FILE_PATH=${AURORA_TTS_MODEL_FILE_PATH:-/app/models/voice/en_US-lessac-medium.onnx}
      - AURORA_TTS_MODEL_CONFIG_FILE_PATH=${AURORA_TTS_MODEL_CONFIG_FILE_PATH:-/app/models/voice/en_US-lessac-medium.onnx.txt}
    volumes:
      - ./data:/app/data
      - ./config:/app/config
      - ./logs:/app/logs
      - ./config.json:/app/config.json:ro
      - ./models:/app/models
    networks:
      - aurora-network
    depends_on:
      - config-service
      - redis
    restart: unless-stopped

  # STT Transcription Service
  stt-transcription-service:
    build:
      context: .
      dockerfile: docker/services/Dockerfile.transcription
      args:
        STT_TRANSCRIPTION_HARDWARE: ${STT_TRANSCRIPTION_HARDWARE:-cpu}
    container_name: aurora-stt-transcription
    command: python -m app.services.stt_transcription
    environment:
      - AURORA_ENV=production
      - AURORA_ARCHITECTURE_MODE=processes
      - REDIS_URL=redis://redis:6379
      - AURORA_LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/app/data
      - ./config:/app/config
      - ./logs:/app/logs
      - ./config.json:/app/config.json:ro
    networks:
      - aurora-network
    depends_on:
      - config-service
      - redis
    restart: unless-stopped

  # STT Wakeword Service
  stt-wakeword-service:
    build:
      context: .
      dockerfile: docker/services/Dockerfile.wakeword
      args:
        STT_WAKEWORD_HARDWARE: ${STT_WAKEWORD_HARDWARE:-cpu}
    container_name: aurora-stt-wakeword
    command: python -m app.services.stt_wakeword
    environment:
      - AURORA_ENV=production
      - AURORA_ARCHITECTURE_MODE=processes
      - REDIS_URL=redis://redis:6379
      - AURORA_LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
      - AURORA_WAKE_WORD_MODEL_PATH=${AURORA_WAKE_WORD_MODEL_PATH:-/app/models/wakeword/jarvis.onnx}
    volumes:
      - ./data:/app/data
      - ./config:/app/config
      - ./logs:/app/logs
      - ./config.json:/app/config.json:ro
      - ./models:/app/models
    networks:
      - aurora-network
    depends_on:
      - config-service
      - redis
    restart: unless-stopped

  # Scheduler Service
  scheduler-service:
    build:
      context: .
      dockerfile: docker/services/Dockerfile.scheduler
    container_name: aurora-scheduler
    command: python -m app.services.scheduler
    environment:
      - AURORA_ENV=production
      - AURORA_ARCHITECTURE_MODE=processes
      - REDIS_URL=redis://redis:6379
      - AURORA_LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/app/data
      - ./config:/app/config
      - ./logs:/app/logs
      - ./config.json:/app/config.json:ro
    networks:
      - aurora-network
    depends_on:
      - config-service
      - db-service
      - redis
    restart: unless-stopped

  # Tooling Service
  tooling-service:
    build:
      context: .
      dockerfile: docker/services/Dockerfile.tooling
    container_name: aurora-tooling
    command: python -m app.services.tooling
    environment:
      - AURORA_ENV=production
      - AURORA_ARCHITECTURE_MODE=processes
      - REDIS_URL=redis://redis:6379
      - AURORA_LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/app/data
      - ./config:/app/config
      - ./logs:/app/logs
      - ./config.json:/app/config.json:ro
    networks:
      - aurora-network
    depends_on:
      - config-service
      - db-service
      - redis
    restart: unless-stopped



  # STT Coordinator Service (now includes audio capture)
  stt-coordinator-service:
    build:
      context: .
      dockerfile: docker/services/Dockerfile.stt-coordinator
    container_name: aurora-stt-coordinator
    command: python -m app.services.stt_coordinator
    environment:
      - AURORA_ENV=production
      - AURORA_ARCHITECTURE_MODE=processes
      - REDIS_URL=redis://redis:6379
      - AURORA_LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/app/data
      - ./config:/app/config
      - ./logs:/app/logs
      - ./config.json:/app/config.json:ro
    devices:
      - /dev/snd:/dev/snd  # Audio devices (now needed for microphone access)
    networks:
      - aurora-network
    depends_on:
      - config-service
      - stt-wakeword-service
      - stt-transcription-service
      - redis
    restart: unless-stopped

networks:
  aurora-network:
    driver: bridge

volumes:
  redis_data:
    driver: local
