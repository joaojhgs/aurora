[[permission]]
identifier = "aurora-secure-storage"
description = "Allow Aurora credential helpers to persist auth/session, mesh, gateway, and admin-unlock secrets in the platform keychain. No web storage, filesystem, shell, or broad process permission is granted."
commands.allow = [
  "aurora_secure_storage_get",
  "aurora_secure_storage_set",
  "aurora_secure_storage_delete"
]
