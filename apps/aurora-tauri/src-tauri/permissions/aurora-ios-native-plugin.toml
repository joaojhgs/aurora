[[permission]]
identifier = "aurora-ios-native-plugin"
description = "Allow the frontend SDK adapter to invoke the Aurora iOS Swift native plugin capability, status, and concrete action handoff methods."
commands.allow = [
  "aurora_ios_native_plugin_manifest",
  "aurora_ios_invocation_status",
  "aurora_ios_entrypoint_payload",
  "aurora_ios_invoke_action",
  "aurora_ios_secure_storage_status",
  "aurora_ios_biometric_status",
  "aurora_ios_admin_unlock"
]
