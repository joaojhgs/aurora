name: End-to-End Tests

on:
  # E2E tests run only on pull request to main/develop and manual trigger
  # pull_request:
  #   branches: [ main, develop ]
  workflow_dispatch:

jobs:
  e2e_test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]  # Limited to reduce resource usage
        python-version: ['3.11.11']  # Using stable version

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Install UV
      run: pip install uv
        
    - name: Install dependencies
      run: uv pip install --system -e .[dev,test-e2e]
        
    - name: Run end-to-end tests
      run: |
        pytest tests/e2e -v
        
    - name: Upload coverage report
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: e2etests
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}
