name: Tauri iOS Release Gate

on:
  pull_request:
    paths:
      - "apps/aurora-tauri/**"
      - "packages/aurora-sdk/**"
      - "packages/aurora-ui/**"
      - "modules/ui-mock-reference/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/tauri-ios-release.yml"
  workflow_dispatch:
    inputs:
      app_store_dry_run:
        description: "Run App Store Connect export/signing dry run. Requires Apple signing secrets."
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  ios-policy:
    name: iOS manifest and UI policy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SDK
        run: pnpm --filter @aurora/client build

      - name: Typecheck shared UI
        run: pnpm --filter @aurora/ui typecheck

      - name: Test shared UI
        run: pnpm --filter @aurora/ui test

      - name: Validate iOS release-gate policy
        run: pnpm --filter @aurora/tauri-ui ios:policy

  ios-macos-xcode:
    name: macOS Xcode iOS gate
    runs-on: macos-latest
    if: github.event_name == 'workflow_dispatch'
    needs: ios-policy

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri workspace dependencies
        run: |
          pnpm --filter @aurora/client build
          pnpm --filter @aurora/ui build
          pnpm --filter @aurora/tauri-ui build

      - name: Verify macOS, Xcode, and generated iOS project
        run: pnpm --filter @aurora/tauri-ui ios:gate

      - name: Run App Store Connect signing dry run
        if: inputs.app_store_dry_run == 'true'
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
        run: pnpm --filter @aurora/tauri-ui ios:build:app-store
