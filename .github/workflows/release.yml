name: Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Release type"
        required: true
        default: auto
        type: choice
        options: [auto, patch, minor, major]
      prerelease:
        description: "Create prerelease"
        required: false
        default: false
        type: boolean
      dry_run:
        description: "Validate release without creating a tag/release"
        required: false
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-readiness:
    name: Release readiness checks
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install Python release dependencies
        run: uv sync --extra dev --extra build

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lightweight release check
        run: |
          uv run make check-config-generated
          uv run ruff check app tests scripts
          pnpm --filter @aurora/client build
          pnpm --filter @aurora/ui build
          pnpm --filter @aurora/tauri-ui prepare:sidecar:thin
          pnpm --filter @aurora/tauri-ui build

      - name: Check next semantic version
        id: semver
        run: |
          if [ "${{ inputs.release_type }}" = "auto" ]; then
            version=$(uv run semantic-release version --print --no-commit --no-tag --no-push --no-vcs-release)
          else
            version=$(uv run semantic-release version --print --no-commit --no-tag --no-push --no-vcs-release --${{ inputs.release_type }})
          fi
          if [ -z "$version" ]; then
            echo "semantic-release produced an empty version" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Release candidate version: $version"

  create-release:
    name: Create semantic release
    runs-on: ubuntu-latest
    needs: release-readiness
    if: inputs.dry_run == false
    timeout-minutes: 20
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_RELEASE || github.token }}

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Python Semantic Release
        uses: python-semantic-release/python-semantic-release@v10.4.1
        env:
          GH_TOKEN: ${{ secrets.PAT_RELEASE || github.token }}
        with:
          github_token: ${{ secrets.PAT_RELEASE || github.token }}
          git_committer_name: "github-actions[bot]"
          git_committer_email: "github-actions[bot]@users.noreply.github.com"
          root_options: -vv --strict
          force: ${{ inputs.release_type != 'auto' && inputs.release_type || '' }}
          prerelease: ${{ inputs.prerelease == true }}
          prerelease_token: rc
