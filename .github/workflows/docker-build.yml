name: 🐳 Build and Push Docker Images

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag"
        required: true
        default: "latest"

env:
  DOCKER_REGISTRY: docker.io
  DOCKER_NAMESPACE: aurora-ai

jobs:
  build-and-push:
    name: 🏗️ Build ${{ matrix.service }}:${{ matrix.variant }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Config Service
          - service: config
            variant: latest
            dockerfile: docker/services/Dockerfile.config
            build_args: ""
          # DB Service
          - service: db
            variant: openai
            dockerfile: docker/services/Dockerfile.db
            build_args: DB_EMBEDDINGS_MODE=openai
          - service: db
            variant: local
            dockerfile: docker/services/Dockerfile.db
            build_args: DB_EMBEDDINGS_MODE=local
          # Orchestrator Service
          - service: orchestrator
            variant: openai
            dockerfile: docker/services/Dockerfile.orchestrator
            build_args: ORCHESTRATOR_LLM_MODE=openai
          - service: orchestrator
            variant: llama-cpp-cpu
            dockerfile: docker/services/Dockerfile.orchestrator
            build_args: |
              ORCHESTRATOR_LLM_MODE=llama-cpp
              ORCHESTRATOR_HARDWARE=cpu
          - service: orchestrator
            variant: llama-cpp-cuda
            dockerfile: docker/services/Dockerfile.orchestrator
            build_args: |
              ORCHESTRATOR_LLM_MODE=llama-cpp
              ORCHESTRATOR_HARDWARE=cuda
          # TTS Service
          - service: tts
            variant: cpu
            dockerfile: docker/services/Dockerfile.tts
            build_args: TTS_HARDWARE=cpu
          - service: tts
            variant: cuda
            dockerfile: docker/services/Dockerfile.tts
            build_args: TTS_HARDWARE=cuda
          # STT Transcription Service
          - service: stt-transcription
            variant: cpu
            dockerfile: docker/services/Dockerfile.transcription
            build_args: STT_TRANSCRIPTION_HARDWARE=cpu
          - service: stt-transcription
            variant: cuda
            dockerfile: docker/services/Dockerfile.transcription
            build_args: STT_TRANSCRIPTION_HARDWARE=cuda
          # STT Wakeword Service
          - service: stt-wakeword
            variant: cpu
            dockerfile: docker/services/Dockerfile.wakeword
            build_args: STT_WAKEWORD_HARDWARE=cpu
          - service: stt-wakeword
            variant: cuda
            dockerfile: docker/services/Dockerfile.wakeword
            build_args: STT_WAKEWORD_HARDWARE=cuda
          # Scheduler Service
          - service: scheduler
            variant: latest
            dockerfile: docker/services/Dockerfile.scheduler
            build_args: ""
          # Tooling Service
          - service: tooling
            variant: latest
            dockerfile: docker/services/Dockerfile.tooling
            build_args: ""
          # STT Coordinator Service
          - service: stt-coordinator
            variant: latest
            dockerfile: docker/services/Dockerfile.stt-coordinator
            build_args: ""

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 📋 Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            # Extract from tag (e.g., v1.0.0 -> 1.0.0)
            VERSION=${GITHUB_REF#refs/tags/v}
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          fi

      - name: 🏗️ Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_NAMESPACE }}/aurora-${{ matrix.service }}:${{ matrix.variant }}-${{ steps.version.outputs.version }}
            ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_NAMESPACE }}/aurora-${{ matrix.service }}:${{ matrix.variant }}-latest
          build-args: ${{ matrix.build_args }}
          cache-from: type=registry,ref=${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_NAMESPACE }}/aurora-${{ matrix.service }}:${{ matrix.variant }}-latest
          cache-to: type=inline
