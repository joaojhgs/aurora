name: Docker Images

on:
  pull_request:
    paths:
      - "app/**"
      - "docker/**"
      - "docker-compose.process.yml"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/docker-build.yml"
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      push_images:
        description: "Push images to registry"
        required: true
        default: "false"
        type: choice
        options: ["false", "true"]
      version:
        description: "Image version tag for manual pushes"
        required: false
        default: "manual"

permissions:
  contents: read

concurrency:
  group: docker-images-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKER_REGISTRY: ghcr.io
  DOCKER_NAMESPACE: ${{ github.repository_owner }}

jobs:
  compose-config:
    name: Validate process-mode Compose config
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose.process.yml
        run: docker compose -f docker-compose.process.yml config --quiet

  docker-build:
    name: Validate ${{ matrix.service }} (${{ matrix.variant }})
    runs-on: ubuntu-latest
    needs: compose-config
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: auth
            variant: latest
            dockerfile: docker/services/Dockerfile.auth
            build_args: ""
          - service: config
            variant: latest
            dockerfile: docker/services/Dockerfile.config
            build_args: ""
          - service: db
            variant: openai
            dockerfile: docker/services/Dockerfile.db
            build_args: DB_EMBEDDINGS_MODE=openai
          - service: db
            variant: local-cpu
            dockerfile: docker/services/Dockerfile.db
            build_args: DB_EMBEDDINGS_MODE=local
          - service: gateway
            variant: latest
            dockerfile: docker/services/Dockerfile.gateway
            build_args: ""
          - service: orchestrator
            variant: openai
            dockerfile: docker/services/Dockerfile.orchestrator
            build_args: ORCHESTRATOR_LLM_MODE=openai
          - service: orchestrator
            variant: llama-cpp-cpu
            dockerfile: docker/services/Dockerfile.orchestrator
            build_args: |
              ORCHESTRATOR_LLM_MODE=llama-cpp
              ORCHESTRATOR_HARDWARE=cpu
          - service: scheduler
            variant: latest
            dockerfile: docker/services/Dockerfile.scheduler
            build_args: ""
          - service: tooling
            variant: latest
            dockerfile: docker/services/Dockerfile.tooling
            build_args: ""
          - service: tts
            variant: cpu
            dockerfile: docker/services/Dockerfile.tts
            build_args: TTS_HARDWARE=cpu
          - service: stt-coordinator
            variant: latest
            dockerfile: docker/services/Dockerfile.stt-coordinator
            build_args: ""
          - service: stt-transcription
            variant: cpu
            dockerfile: docker/services/Dockerfile.transcription
            build_args: STT_TRANSCRIPTION_HARDWARE=cpu
          - service: stt-wakeword
            variant: cpu
            dockerfile: docker/services/Dockerfile.wakeword
            build_args: STT_WAKEWORD_HARDWARE=cpu

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image without publishing
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          tags: aurora-${{ matrix.service }}:${{ matrix.variant }}-ci
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha,scope=${{ matrix.service }}-${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}-${{ matrix.variant }}

  docker-publish:
    name: Publish ${{ matrix.service }} (${{ matrix.variant }})
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.push_images == 'true')
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: auth
            variant: latest
            dockerfile: docker/services/Dockerfile.auth
            build_args: ""
          - service: config
            variant: latest
            dockerfile: docker/services/Dockerfile.config
            build_args: ""
          - service: db
            variant: openai
            dockerfile: docker/services/Dockerfile.db
            build_args: DB_EMBEDDINGS_MODE=openai
          - service: db
            variant: local-cpu
            dockerfile: docker/services/Dockerfile.db
            build_args: DB_EMBEDDINGS_MODE=local
          - service: gateway
            variant: latest
            dockerfile: docker/services/Dockerfile.gateway
            build_args: ""
          - service: orchestrator
            variant: openai
            dockerfile: docker/services/Dockerfile.orchestrator
            build_args: ORCHESTRATOR_LLM_MODE=openai
          - service: orchestrator
            variant: llama-cpp-cpu
            dockerfile: docker/services/Dockerfile.orchestrator
            build_args: |
              ORCHESTRATOR_LLM_MODE=llama-cpp
              ORCHESTRATOR_HARDWARE=cpu
          - service: scheduler
            variant: latest
            dockerfile: docker/services/Dockerfile.scheduler
            build_args: ""
          - service: tooling
            variant: latest
            dockerfile: docker/services/Dockerfile.tooling
            build_args: ""
          - service: tts
            variant: cpu
            dockerfile: docker/services/Dockerfile.tts
            build_args: TTS_HARDWARE=cpu
          - service: stt-coordinator
            variant: latest
            dockerfile: docker/services/Dockerfile.stt-coordinator
            build_args: ""
          - service: stt-transcription
            variant: cpu
            dockerfile: docker/services/Dockerfile.transcription
            build_args: STT_TRANSCRIPTION_HARDWARE=cpu
          - service: stt-wakeword
            variant: cpu
            dockerfile: docker/services/Dockerfile.wakeword
            build_args: STT_WAKEWORD_HARDWARE=cpu

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Decide version
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_NAMESPACE }}/aurora-${{ matrix.service }}:${{ matrix.variant }}-${{ steps.meta.outputs.version }}
            ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_NAMESPACE }}/aurora-${{ matrix.service }}:${{ matrix.variant }}
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha,scope=${{ matrix.service }}-${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}-${{ matrix.variant }}
