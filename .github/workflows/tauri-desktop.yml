name: Tauri Desktop Verification

on:
  pull_request:
    paths:
      - "apps/aurora-tauri/**"
      - "packages/aurora-sdk/**"
      - "packages/aurora-ui/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/tauri-desktop.yml"
  workflow_dispatch:

jobs:
  linux-tauri:
    name: Linux Tauri check and smoke launch
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri Linux prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            webkit2gtk-driver \
            xvfb

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri workspace dependencies
        run: |
          pnpm --filter @aurora/client build
          pnpm --filter @aurora/ui build

      - name: Build Tauri frontend bundle
        run: pnpm --filter @aurora/tauri-ui build

      - name: Test Tauri frontend runtime wrapper
        run: pnpm --filter @aurora/tauri-ui test

      - name: Record Android release gate matrix
        run: pnpm --filter @aurora/tauri-ui android:release-gate

      - name: Check Tauri Rust package
        run: cargo check
        working-directory: apps/aurora-tauri/src-tauri

      - name: Smoke launch Tauri shell
        run: |
          set +e
          xvfb-run -a timeout 180s pnpm --filter @aurora/tauri-ui tauri dev
          status=$?
          if [ "$status" -eq 124 ]; then
            echo "Tauri shell stayed running until the smoke timeout."
            exit 0
          fi
          exit "$status"
