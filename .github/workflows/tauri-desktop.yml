name: Tauri Desktop Verification

on:
  pull_request:
    paths:
      - "apps/aurora-tauri/**"
      - "packages/aurora-sdk/**"
      - "packages/aurora-ui/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/tauri-desktop.yml"
  workflow_dispatch:

jobs:
  linux-tauri:
    name: Linux Tauri check and smoke launch
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri Linux prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            webkit2gtk-driver \
            portaudio19-dev \
            python3-dev \
            xvfb

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri workspace dependencies
        run: |
          pnpm --filter @aurora/client build
          pnpm --filter @aurora/ui build

      - name: Build Tauri frontend bundle
        run: pnpm --filter @aurora/tauri-ui build

      - name: Test Tauri frontend runtime wrapper
        run: pnpm --filter @aurora/tauri-ui test

      - name: Prepare bundled desktop sidecar automatically
        run: pnpm --filter @aurora/tauri-ui prepare:sidecar:thin

      - name: Upload sidecar prepare report
        uses: actions/upload-artifact@v4
        with:
          name: tauri-sidecar-prepare-report-thin
          path: apps/aurora-tauri/reports/sidecar-prepare.json
          if-no-files-found: error

      - name: Check Tauri Rust package
        run: cargo check
        working-directory: apps/aurora-tauri/src-tauri

      - name: Build lean Linux Tauri bundle
        run: pnpm --filter @aurora/tauri-ui build:bundle:thin

      - name: Smoke launch Tauri shell
        run: |
          set +e
          xvfb-run -a timeout 180s pnpm --filter @aurora/tauri-ui tauri dev
          status=$?
          if [ "$status" -eq 124 ]; then
            echo "Tauri shell stayed running until the smoke timeout."
            exit 0
          fi
          exit "$status"

      - name: Smoke Tauri EventStream bridge
        run: xvfb-run -a pnpm --filter @aurora/tauri-ui eventstream:smoke

      - name: Upload EventStream smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tauri-eventstream-smoke-report
          path: apps/aurora-tauri/reports/eventstream-smoke.json
          if-no-files-found: warn

  sidecar-profile-matrix:
    name: Sidecar profile staging (${{ matrix.profile }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile:
          - thin
          - local-cpu
          - local-cuda
          - local-rocm
          - local-metal
          - local-vulkan
          - local-sycl
          - local-rpc
          - full

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Create fake profile sidecar executable
        run: |
          mkdir -p /tmp/aurora-sidecar-${{ matrix.profile }}
          printf '#!/bin/sh\necho aurora sidecar profile %s\n' '${{ matrix.profile }}' > /tmp/aurora-sidecar-${{ matrix.profile }}/aurora-sidecar
          chmod +x /tmp/aurora-sidecar-${{ matrix.profile }}/aurora-sidecar

      - name: Stage sidecar profile
        env:
          AURORA_TAURI_SIDECAR_BUILD_OUTPUT: /tmp/aurora-sidecar-${{ matrix.profile }}/aurora-sidecar
        run: pnpm --filter @aurora/tauri-ui prepare:sidecar:${{ matrix.profile }}

      - name: Verify sidecar profile report
        run: |
          jq -e '.sidecarProfile == "${{ matrix.profile }}"' apps/aurora-tauri/reports/sidecar-prepare.json
          jq -e '.sourceKind == "existing-build-output"' apps/aurora-tauri/reports/sidecar-prepare.json
          jq -e '.secretsRedacted == true' apps/aurora-tauri/reports/sidecar-prepare.json

      - name: Upload sidecar profile report
        uses: actions/upload-artifact@v4
        with:
          name: tauri-sidecar-prepare-report-${{ matrix.profile }}
          path: apps/aurora-tauri/reports/sidecar-prepare.json
          if-no-files-found: error
