repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
    -   id: check-yaml
    -   id: check-added-large-files
        args: ['--maxkb=1000']
    -   id: check-toml
        exclude: ^pyproject\.toml$  # Exclude pyproject.toml - schema validator doesn't recognize ruff's nested config
    -   id: check-ast  # Verify Python code is valid syntax
    -   id: check-json
    -   id: check-merge-conflict
    -   id: debug-statements  # Check for debugger imports and py37+ breakpoint calls

-   repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
    -   id: ruff
        args: [--fix, --exit-non-zero-on-fix]
    -   id: ruff-format

# -   repo: https://github.com/pre-commit/mirrors-mypy
#     rev: v1.16.1
#     hooks:
#     -   id: mypy
#         additional_dependencies: [types-requests, types-setuptools]
#         exclude: ^tests/
#         args: ["--ignore-missing-imports", "--disable-error-code=attr-defined"]
        
-   repo: https://github.com/asottile/pyupgrade
    rev: v3.20.0
    hooks:
    -   id: pyupgrade
        args: ["--py39-plus"]  # Keep Python syntax compatible with 3.9+

-   repo: https://github.com/commitizen-tools/commitizen
    rev: v4.9.1
    hooks:
    -   id: commitizen
        stages: [commit-msg]
    -   id: commitizen-branch
        stages: [pre-push]
